[visionflow]
MONGO_URI = mongodb://localhost:27017/
UPLOAD_DIR = storage/uploads
DATASET_DIR = storage/datasets
YOLO_MODEL_PATH = yolov8s.pt
PORT_DATASET_SERVICE = 5003
PORT_PROJECT_SERVICE = 5004
PORT_INFERENCE_SERVICE = 5006
PORT_TRAINING_SERVICE = 5005
PORT_AUTH_SERVICE = 5001
API_GATEWAY_URL = http://localhost:8000
SECRET_KEY = dev-secret-key-123
WEB_APP_RESOLUTION = 1920x1080

[TRAINING]
mode = local
device = cpu
gpu_id = 0

[LOCAL]
batch_size = 8
epochs = 25
img_size = 640
workers = 4

[SERVER]
endpoint = http://training-server/api/train
api_key = demo_key
timeout = 3600

[MODEL]
architecture = yolov8n
task = detect

[PATHS]
dataset_dir = storage/datasets/
output_dir = storage/training/
weights_dir = storage/weights/

[PREPROCESSING]
resize = True
img_size = 640
normalize = False
auto_orient = True
padding = True

[AUGMENTATION]
flip = True
rotation = True
brightness = True
noise = False
blur = False
zoom = True
shear = False
