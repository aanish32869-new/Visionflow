server {
    listen 80;

    # Auth logic
    location /api/signup { proxy_pass http://auth-service:5001/api/signup; }
    location /api/login { proxy_pass http://auth-service:5001/api/login; }

    # Inference logic
    location ~ ^/api/projects/([^/]+)/models$ { proxy_pass http://inference-service:5006; }
    location ~ ^/api/projects/([^/]+)/models/([^/]+)/infer$ { proxy_pass http://inference-service:5006; }

    # Dataset logic (covers /api/workspaces, /api/folders, /api/projects, /api/assets, /api/assets/..., /api/projects/../versions, etc.)
    location /api/ { proxy_pass http://dataset-service:5003; }
    
    # Static files served by dataset-service
    location /uploads/ { proxy_pass http://dataset-service:5003/uploads/; }
    location /datasets/ { proxy_pass http://dataset-service:5003/datasets/; }

    # Frontend
    location / { proxy_pass http://web:3000; }
}
