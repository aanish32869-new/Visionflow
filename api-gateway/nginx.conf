server {
    listen 80;

    # Auth
    location /api/signup { proxy_pass http://auth-service:5001/api/signup; }
    location /api/login { proxy_pass http://auth-service:5001/api/login; }

    # Inference. Keep infer before generic model registry routes.
    location ~ ^/api/projects/[^/]+/models/[^/]+/infer { proxy_pass http://inference-service:5006; }
    location ~ ^/api/(auto-label|classify|infer) { proxy_pass http://inference-service:5006; }

    # Training and model registry
    location /api/training { proxy_pass http://training-service:5005; }
    location /api/models { proxy_pass http://training-service:5005; }
    location ~ ^/api/projects/[^/]+/(train|jobs) { proxy_pass http://training-service:5005; }
    location ~ ^/api/projects/[^/]+/models { proxy_pass http://training-service:5005; }

    # Dataset/version/export/analytics
    location ~ ^/api/projects/[^/]+/(versions|annotation-status|dataset|analytics) { proxy_pass http://dataset-service:5003; }
    location /api/annotations { proxy_pass http://dataset-service:5003; }
    location ~ ^/api/batches/[^/]+/export { proxy_pass http://dataset-service:5003; }

    # Project service
    location ~ ^/api/(projects|assets|folders|workspace-overview|jobs|batches|logs|deployments|workflows) {
        proxy_pass http://project-service:5004;
    }
    
    # Static files
    location /uploads/ { proxy_pass http://project-service:5004/uploads/; }
    location /datasets/ { proxy_pass http://dataset-service:5003/datasets/; }

    # Frontend
    location / { proxy_pass http://web:3000; }
}
